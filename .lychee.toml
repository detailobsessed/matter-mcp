# Lychee link checker configuration
# https://github.com/lycheeverse/lychee

# Don't check the config file itself (regex patterns get parsed as URLs)
exclude_path = [".lychee.toml", "docs/.overrides/"]

# Exclude placeholder and example URLs
exclude = [
    '^https://example\.com',
    '^https://your-',
    '^https://pypi\.org/project/my-',
    '^https://codecov\.io/gh/your-',
    '^mailto:',
    # Localhost URLs (e.g. docs preview in CONTRIBUTING.md)
    '^http://localhost',
    # Self-referential URLs to this repo and its GitHub Pages site.
    # These don't exist on a fresh scaffold (before `gh repo create` / first CI run / docs deploy)
    # and they're user-owned anyway -- lychee can't tell us anything we don't already know.
    '^https?://github\.com/detailobsessed/matter-mcp(/|$)',
    '^https?://detailobsessed\.github\.io/matter-mcp(/|$)',
]

# Exclude local/private addresses
exclude_all_private = true

# Don't check mail addresses
include_mail = false

# Accept common status codes
# 502: GitHub commit/release URLs transiently return Bad Gateway
accept = [200, 204, 301, 302, 403, 429, 502]

# Timeout per request
timeout = 30

# Max concurrent requests
max_concurrency = 16

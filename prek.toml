#:schema https://www.schemastore.org/prek.json
default_stages = ["pre-commit"]
minimum_prek_version = "0.4.3"  # pin to installed version; 0.3.11+ needed for --repo-exclude-tag (scripts/prek-autoupdate.sh)
# All available: commit-msg, post-checkout, post-commit, post-merge, post-rewrite, pre-commit, pre-merge-commit, pre-push, pre-rebase, prepare-commit-msg
default_install_hook_types = ["commit-msg", "post-checkout", "post-merge", "post-rewrite", "pre-commit", "pre-push"]

[[repos]]
repo = "builtin"
hooks = [
  { id = "trailing-whitespace", priority = 0 },
  { id = "end-of-file-fixer", priority = 0 },
  { id = "check-yaml", args = ["--allow-multiple-documents"], priority = 0 },
  { id = "check-toml", priority = 0 },
  { id = "check-json", priority = 0 },
  { id = "check-added-large-files", priority = 0 },
  { id = "check-merge-conflict", args = ["--assume-in-merge"], priority = 0 },  # --assume-in-merge catches markers from `copier update --conflict inline` (no .git/MERGE_MSG)
  { id = "check-case-conflict", priority = 0 },
  { id = "check-symlinks", priority = 0 },
  { id = "check-executables-have-shebangs", priority = 0 },
  { id = "check-shebang-scripts-are-executable", priority = 0 },
  { id = "check-illegal-windows-names", priority = 0 },
  { id = "destroyed-symlinks", priority = 0 },
  { id = "mixed-line-ending", args = ["--fix=lf"], priority = 0 },
  { id = "detect-private-key", priority = 0 },
]

[[repos]]
repo = "https://github.com/detailobsessed/sync-with-uv"
rev = "v0.6.0-prek"  # prek autoupdate will fill this
hooks = [{ id = "sync-with-uv", priority = 0 }]

[[repos]]
repo = "https://github.com/betterleaks/betterleaks"
rev = "v1.1.2"  # prek autoupdate will fill this
hooks = [{ id = "betterleaks", priority = 1 }]

[[repos]]
repo = "https://github.com/astral-sh/ruff-pre-commit"
rev = "v0.15.10"  # prek autoupdate will fill this
hooks = [
  { id = "ruff", args = ["--fix"], priority = 1 },
  { id = "ruff-format", priority = 1 },
]

[[repos]]
repo = "https://github.com/astral-sh/uv-pre-commit"
rev = "0.11.6"  # prek autoupdate will fill this
hooks = [
  { id = "uv-lock", priority = 1 },
  { id = "uv-sync", stages = ["post-checkout", "post-merge", "post-rewrite"], priority = 1 },
]

[[repos]]
repo = "https://github.com/shellcheck-py/shellcheck-py"
rev = "v0.11.0.1"  # prek autoupdate will fill this
hooks = [{ id = "shellcheck", priority = 1 }]

[[repos]]
repo = "https://github.com/rhysd/actionlint"
rev = "v1.7.12"  # prek autoupdate will fill this
hooks = [{ id = "actionlint", priority = 1 }]

[[repos]]
repo = "https://github.com/crate-ci/typos"
rev = "v1.45.1"  # prek autoupdate will fill this
hooks = [{ id = "typos", priority = 1 }]

[[repos]]
repo = "https://github.com/igorshubovych/markdownlint-cli"
rev = "v0.48.0"  # prek autoupdate will fill this
hooks = [{ id = "markdownlint", args = ["--fix", "--ignore", "CHANGELOG.md"], priority = 1 }]

[[repos]]
repo = "https://github.com/lycheeverse/lychee"
rev = "lychee-v0.24.2"  # use scripts/prek-autoupdate.sh, not bare `prek autoupdate` (DOT-492)
hooks = [{ id = "lychee", args = ["--config", ".lychee.toml"], priority = 1, types_or = ["markdown", "html", "rst", "yaml"] }]

[[repos]]
repo = "local"

# Block commits containing .rej files produced by `copier update --conflict rej` (DOT-542).
# https://copier.readthedocs.io/en/stable/updating/#tips-and-tricks
[[repos.hooks]]
id = "no-copier-rej-files"
name = "block copier .rej files"
entry = "Found copier update rejection files (.rej). Review the diff, apply changes manually, delete the .rej file, then commit."
language = "fail"
files = "\\.rej$"
priority = 0

[[repos.hooks]]
id = "ty"
name = "ty type checker"
entry = "uv run ty check"
language = "system"
types = ["python"]
pass_filenames = false
priority = 1

[[repos.hooks]]
id = "pytest-testmon"
name = "pytest affected tests"
entry = "uv run pytest -q --testmon --no-cov"
language = "system"
types = ["python"]
pass_filenames = false
verbose = true
stages = ["pre-commit"]
priority = 1

[[repos.hooks]]
id = "pytest-cov"
name = "pytest with coverage"
entry = "uv run pytest -q --cov --cov-fail-under=95 --cov-report=term-missing:skip-covered"
language = "system"
types = ["python"]
pass_filenames = false
verbose = true
stages = ["pre-push"]
priority = 1

[[repos.hooks]]
id = "docs-build"
name = "docs build check"
entry = "bash -c 'test -f htmlcov/index.html || (mkdir -p htmlcov && touch htmlcov/index.html); uv run poe docs-build'"
language = "system"
files = { glob = ["docs/**", "zensical.toml", "README.md", "CONTRIBUTING.md", "CHANGELOG.md", "src/**"] }
pass_filenames = false
stages = ["pre-push"]

[[repos.hooks]]
id = "check-template-update"
name = "check for template updates"
entry = "bash scripts/check-template-update.sh"
language = "system"
always_run = true
pass_filenames = false
verbose = true
stages = ["post-checkout"]

[[repos]]
repo = "https://github.com/compilerla/conventional-pre-commit"
rev = "v4.4.0"  # prek autoupdate will fill this
hooks = [
  { id = "conventional-pre-commit", stages = ["commit-msg"], priority = 1, args = [
    "--strict",
    "--verbose",
    "feat",
    "fix",
    "perf",
    "build",
    "chore",
    "ci",
    "docs",
    "style",
    "refactor",
    "test",
  ] },
]
